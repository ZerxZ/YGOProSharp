name: Build YGOProSharp Native

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  NATIVE_DIR: YGOProSharp.Native
  CONFIGURATION: Release

jobs:
  build-native:
    name: Build ocgcore for ${{ matrix.rid }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows
          - os: windows-2025
            rid: win-x64
            xmake_plat: windows
            xmake_arch: x64

          - os: windows-11-arm
            rid: win-arm64
            xmake_plat: windows
            xmake_arch: arm64

          # Linux
          - os: ubuntu-latest
            rid: linux-x64
            xmake_plat: linux
            xmake_arch: x64

          - os: ubuntu-24.04-arm
            rid: linux-arm64
            xmake_plat: linux
            xmake_arch: arm64

          # macOS
          - os: macos-15-intel
            rid: osx-x64
            xmake_plat: macosx
            xmake_arch: x64

          - os: macos-latest
            rid: osx-arm64
            xmake_plat: macosx
            xmake_arch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup xmake
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest

      - name: Configure xmake
        working-directory: ${{ env.NATIVE_DIR }}
        shell: bash
        run: |
          xmake f -c \
            -p ${{ matrix.xmake_plat }} \
            -a ${{ matrix.xmake_arch }} \
            -m release \
            -y

      - name: Build ocgcore
        working-directory: ${{ env.NATIVE_DIR }}
        shell: bash
        run: |
          xmake -r ocgcore -y

      - name: Show native output
        working-directory: ${{ env.NATIVE_DIR }}
        shell: bash
        run: |
          ls -R lib/${{ matrix.rid }}

      - name: Upload native artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.rid }}
          path: ${{ env.NATIVE_DIR }}/lib/${{ matrix.rid }}/
          if-no-files-found: error

  pack:
    name: Pack NuGet
    runs-on: ubuntu-latest
    needs: build-native

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download native artifacts
        uses: actions/download-artifact@v4
        with:
          path: ${{ env.NATIVE_DIR }}/lib

      - name: Show downloaded native files
        shell: bash
        run: |
          find "${NATIVE_DIR}/lib" -type f -maxdepth 4 | sort

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Pack NuGet
        shell: bash
        run: |
          dotnet pack "${NATIVE_DIR}/YGOProSharp.Native.csproj" \
            -c "${CONFIGURATION}" \
            -o artifacts/nuget

      - name: Upload NuGet package
        uses: actions/upload-artifact@v4
        with:
          name: YGOProSharp.Native-nuget
          path: artifacts/nuget/*.nupkg
          if-no-files-found: error