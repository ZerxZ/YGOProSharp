name: Build YGOProSharp Native

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  NATIVE_DIR: YGOProSharp.Native
  CONFIGURATION: Release

jobs:
  build-native:
    name: Build ocgcore for ${{ matrix.rid }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows
          - os: windows-2025
            rid: win-x64
            xmake_plat: windows
            xmake_arch: x64

          - os: windows-11-arm
            rid: win-arm64
            xmake_plat: windows
            xmake_arch: arm64

          # Linux
          - os: ubuntu-latest
            rid: linux-x64
            xmake_plat: linux
            xmake_arch: x64

          - os: ubuntu-24.04-arm
            rid: linux-arm64
            xmake_plat: linux
            xmake_arch: arm64

          # macOS
          - os: macos-15-intel
            rid: osx-x64
            xmake_plat: macosx
            xmake_arch: x86_64

          - os: macos-latest
            rid: osx-arm64
            xmake_plat: macosx
            xmake_arch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup xmake
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest
          actions-cache-folder: .xmake-cache
          package-cache: true
          package-cache-key: native-packages-${{ runner.os }}-${{ matrix.rid }}-${{ hashFiles('YGOProSharp.Native/xmake.lua') }}
          build-cache: true
          build-cache-key: native-build-${{ runner.os }}-${{ matrix.rid }}-${{ hashFiles('YGOProSharp.Native/xmake.lua') }}
          project-path: ${{ env.NATIVE_DIR }}

      - name: Cache native downloads
        uses: actions/cache@v4
        with:
          path: ${{ env.NATIVE_DIR }}/.deps
          key: native-downloads-${{ runner.os }}-${{ hashFiles('YGOProSharp.Native/xmake.lua') }}

      - name: Configure xmake
        working-directory: ${{ env.NATIVE_DIR }}
        shell: bash
        run: |
          xmake f -c \
            -p ${{ matrix.xmake_plat }} \
            -a ${{ matrix.xmake_arch }} \
            -m release \
            --policies=build.ccache:y \
            -y

      - name: Build ocgcore
        working-directory: ${{ env.NATIVE_DIR }}
        shell: bash
        run: |
          xmake build ocgcore

      - name: Show native output
        working-directory: ${{ env.NATIVE_DIR }}
        shell: bash
        run: |
          ls -R lib/${{ matrix.rid }}

      - name: Upload native artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.rid }}
          path: ${{ env.NATIVE_DIR }}/lib/${{ matrix.rid }}/
          if-no-files-found: error

  pack:
    name: Pack NuGet
    runs-on: ubuntu-latest
    needs: build-native

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Download native artifacts
        uses: actions/download-artifact@v4
        with:
          path: ${{ env.NATIVE_DIR }}/lib

      - name: Show downloaded native files
        shell: bash
        run: |
          find "${NATIVE_DIR}/lib" -type f -maxdepth 4 | sort

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Pack NuGet
        shell: bash
        run: |
          dotnet pack "${NATIVE_DIR}/YGOProSharp.Native.csproj" \
            -c "${CONFIGURATION}" \
            -o artifacts/nuget

      - name: Upload NuGet package
        uses: actions/upload-artifact@v4
        with:
          name: YGOProSharp.Native-nuget
          path: artifacts/nuget/*.nupkg
          if-no-files-found: error

      - name: Commit native artifacts
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add "${NATIVE_DIR}/lib"
          if git diff --cached --quiet; then
            echo "No native artifact changes to commit."
            exit 0
          fi

          git commit -m "Update native runtime artifacts [skip ci]"
          git push origin "HEAD:${GITHUB_REF_NAME}"
